name: weekly

on:
  schedule:
    - cron: '19 19 * * 5'  # every Friday
  workflow_dispatch:

env:
  DENO_DIR: /tmp/deno

jobs:
  release:
    runs-on: ubuntu-latest
    # Use the `mirakc-ci` bot account in order to invoke the release workflow
    # triggered by a push event for a release tag.
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: |
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          echo "user-id=$USER_ID" >>"$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
          # Always checkout the release branch.
          ref: release
          # Fetch all history for all tags and branches so that `git describe`
          # works properly.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable  # required for scripts/release.sh
      - uses: denoland/setup-deno@v2  # required for scripts/release.sh
        with:
          deno-version: v2.x
      # See https://github.com/actions/create-github-app-token?tab=readme-ov-file#configure-git-cli-for-an-apps-bot-user
      - name: git config
        run: |
          git config --global user.name "$USER_NAME"
          git config --global user.email "$USER_EMAIL"
        env:
          USER_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          USER_EMAIL: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
      - run: |
          TAG="$(git describe --tags --abbrev=0)"
          if git diff --quiet "$TAG"
          then
            echo "Not changed, skip to create new release"
          else
            if [ -e ./scripts/release.sh ]
            then
              sh ./scripts/release.sh patch
            else
              ./scripts/release patch
            fi
            git push
            git push --tags
          fi
