name: tools

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in format <major>.<minor>
        required: false
        type: string
      branch:
        description: Branch to use
        required: true
        type: choice
        options:
          - main
          - release

permissions: {}

env:
  DEBIAN_CODENAME: trixie

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.branch }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          if [ -e ./scripts/update-tools-images.sh ]
          then
            sh ./scripts/update-tools-images.sh --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          else
            ./scripts/update-tools-images --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          fi
        env:
          VERSION: ${{ inputs.version }}
