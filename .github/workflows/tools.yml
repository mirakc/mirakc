name: tools

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in format <major>.<minor>
        required: false
        type: string
      branch:
        description: Branch to use
        required: true
        type: choice
        options:
          - main
          - release

permissions: {}

env:
  DEBIAN_CODENAME: trixie

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ inputs.branch }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          if [ -e ./scripts/update-tools-images.sh ]
          then
            sh ./scripts/update-tools-images.sh --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          else
            ./scripts/update-tools-images --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          fi
        env:
          VERSION: ${{ inputs.version }}
