name: tools

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in format <major>.<minor>
        required: false
        type: string
      branch:
        description: Branch to use
        required: true
        type: choice
        options:
          - main
          - release

permissions: {}

env:
  DEBIAN_CODENAME: trixie

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ inputs.branch }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          if [ -e ./scripts/update-tools-images.sh ]
          then
            sh ./scripts/update-tools-images.sh --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          else
            ./scripts/update-tools-images --no-cache --push "$DEBIAN_CODENAME" "$VERSION"
          fi
        env:
          VERSION: ${{ inputs.version }}
