name: docker

on:
  workflow_call:
    inputs:
      ref-name:
        required: true
        type: string
      ref-type:
        required: true
        # choice: branch | tag
        type: string
      push:
        default: true
        required: false
        type: boolean
    secrets:
      CI_BOT_APP_ID:
        required: true
      CI_BOT_PRIVATE_KEY:
        required: true
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      ref-name:
        description: 'Name of branch/tag'
        required: true
        type: string
      ref-type:
        required: true
        type: choice
        options:
          - branch
          - tag
      push:
        description: 'Push images to registries'
        default: false
        type: boolean

permissions: {}

env:
  DEBIAN_CODENAME: trixie
  REGISTRIES: >-
    docker.io
  PLATFORMS: >-
    linux/386,linux/amd64,linux/arm/v7,linux/arm64/v8

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref-name }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare tags (debian)
        id: debian-tags
        run: |
          if [ -e ./scripts/ghci-docker-tags.sh ]
          then
            sh ./scripts/ghci-docker-tags.sh "$REF_TYPE" "$REF_NAME" debian
          else
            ./scripts/ghci-docker-tags "$REF_TYPE" "$REF_NAME" debian
          fi
        env:
          REF_TYPE: ${{ inputs.ref-type }}
          REF_NAME: ${{ inputs.ref-name }}
      - name: Build and push (mirakc/mirakc:debian*)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.debian-tags.outputs.tools-tag }}
          target: mirakc-debian
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.debian-tags.outputs.tags, 'docker.io/mirakc/mirakc') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Build and push (mirakc/timeshift-fs:debian*)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.debian-tags.outputs.tools-tag }}
          target: timeshift-fs-debian
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.debian-tags.outputs.tags, 'docker.io/mirakc/timeshift-fs') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Prepare tags (alpine)
        id: alpine-tags
        run: |
          if [ -e ./scripts/ghci-docker-tags.sh ]
          then
            sh ./scripts/ghci-docker-tags.sh "$REF_TYPE" "$REF_NAME" alpine
          else
            ./scripts/ghci-docker-tags "$REF_TYPE" "$REF_NAME" alpine
          fi
        env:
          REF_TYPE: ${{ inputs.ref-type }}
          REF_NAME: ${{ inputs.ref-name }}
      - name: Build and push (mirakc/mirakc:alpine*)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.alpine-tags.outputs.tools-tag }}
          target: mirakc-alpine
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.alpine-tags.outputs.tags, 'docker.io/mirakc/mirakc') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Build and push (mirakc/timeshift-fs:alpine*)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.alpine-tags.outputs.tools-tag }}
          target: timeshift-fs-alpine
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.alpine-tags.outputs.tags, 'docker.io/mirakc/timeshift-fs') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Test
        if: ${{ inputs.push }}
        run: |
          if [ -e ./scripts/ghci-docker-test.sh ]
          then
            sh ./scripts/ghci-docker-test.sh "$REF_NAME" "$REGISTRIES" "$(echo $PLATFORMS | tr ',' ' ')"
          else
            ./scripts/ghci-docker-test "$REF_NAME" "$REGISTRIES" "$(echo $PLATFORMS | tr ',' ' ')"
          fi
        env:
          REF_NAME: ${{ inputs.ref-name }}

  trigger:
    if: ${{ inputs.push }}
    needs:
      - docker
    runs-on: ubuntu-latest
    steps:
      # Use the `mirakc-ci` bot account in order to trigger the docker workflow
      # on mirakc/docker-timeshift-x.
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          # The access will be scoped to only the docker-timeshift-x of the current repository
          # owner.
          repositories: docker-timeshift-x
          permission-actions: write
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: json-inputs
        with:
          script: |
            return JSON.stringify({ version: process.env.REF_NAME });
        env:
          REF_NAME: ${{ inputs.ref-name }}
      - name: Trigger the docker workflow on mirakc/docker-timeshift-x
        run: |
          echo "$JSON_INPUTS" | gh workflow run docker.yml -R mirakc/docker-timeshift-x --json
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          JSON_INPUTS: ${{ steps.json-inputs.outputs.result }}
