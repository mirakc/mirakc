name: docker

on:
  workflow_call:
    inputs:
      ref-name:
        required: true
        type: string
      ref-type:
        required: true
        # choice: branch | tag
        type: string
      push:
        default: true
        required: false
        type: boolean
    secrets:
      CI_BOT_APP_ID:
        required: true
      CI_BOT_PRIVATE_KEY:
        required: true
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      ref-name:
        description: 'Name of branch/tag'
        required: true
        type: string
      ref-type:
        required: true
        type: choice
        options:
          - branch
          - tag
      push:
        description: 'Push images to registries'
        default: false
        type: boolean

permissions: {}

env:
  DEBIAN_CODENAME: trixie
  REGISTRIES: >-
    docker.io
  PLATFORMS: >-
    linux/386,linux/amd64,linux/arm/v7,linux/arm64/v8

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref-name }}
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare tags (debian)
        id: debian-tags
        run: |
          if [ -e ./scripts/ghci-docker-tags.sh ]
          then
            sh ./scripts/ghci-docker-tags.sh "$REF_TYPE" "$REF_NAME" debian
          else
            ./scripts/ghci-docker-tags "$REF_TYPE" "$REF_NAME" debian
          fi
        env:
          REF_TYPE: ${{ inputs.ref-type }}
          REF_NAME: ${{ inputs.ref-name }}
      - name: Build and push (mirakc/mirakc:debian*)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.debian-tags.outputs.tools-tag }}
          target: mirakc-debian
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.debian-tags.outputs.tags, 'docker.io/mirakc/mirakc') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Build and push (mirakc/timeshift-fs:debian*)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.debian-tags.outputs.tools-tag }}
          target: timeshift-fs-debian
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.debian-tags.outputs.tags, 'docker.io/mirakc/timeshift-fs') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Prepare tags (alpine)
        id: alpine-tags
        run: |
          if [ -e ./scripts/ghci-docker-tags.sh ]
          then
            sh ./scripts/ghci-docker-tags.sh "$REF_TYPE" "$REF_NAME" alpine
          else
            ./scripts/ghci-docker-tags "$REF_TYPE" "$REF_NAME" alpine
          fi
        env:
          REF_TYPE: ${{ inputs.ref-type }}
          REF_NAME: ${{ inputs.ref-name }}
      - name: Build and push (mirakc/mirakc:alpine*)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.alpine-tags.outputs.tools-tag }}
          target: mirakc-alpine
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.alpine-tags.outputs.tags, 'docker.io/mirakc/mirakc') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Build and push (mirakc/timeshift-fs:alpine*)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            DEBIAN_CODENAME=${{ env.DEBIAN_CODENAME }}
            TOOLS_TAG=${{ steps.alpine-tags.outputs.tools-tag }}
          target: timeshift-fs-alpine
          platforms: ${{ env.PLATFORMS }}
          tags: >-
            ${{ format(steps.alpine-tags.outputs.tags, 'docker.io/mirakc/timeshift-fs') }},
          cache-from: |
            type=local,src=/tmp/.docker-cache
          cache-to: |
            type=local,dest=/tmp/.docker-cache
          push: ${{ inputs.push }}
      - name: Test
        if: ${{ inputs.push }}
        run: |
          if [ -e ./scripts/ghci-docker-test.sh ]
          then
            sh ./scripts/ghci-docker-test.sh "$REF_NAME" "$REGISTRIES" "$(echo $PLATFORMS | tr ',' ' ')"
          else
            ./scripts/ghci-docker-test "$REF_NAME" "$REGISTRIES" "$(echo $PLATFORMS | tr ',' ' ')"
          fi
        env:
          REF_NAME: ${{ inputs.ref-name }}

  trigger:
    if: ${{ inputs.push }}
    needs:
      - docker
    runs-on: ubuntu-latest
    steps:
      # Use the `mirakc-ci` bot account in order to trigger the docker workflow
      # on mirakc/docker-timeshift-x.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          # app-id was deprecated in 3.1.0
          client-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          # The access will be scoped to only the docker-timeshift-x of the current repository
          # owner.
          repositories: docker-timeshift-x
          permission-actions: write
      - name: Trigger the docker workflow on mirakc/docker-timeshift-x
        run: >-
          gh workflow run docker.yml
          -R mirakc/docker-timeshift-x
          -f version="$REF_NAME"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REF_NAME: ${{ inputs.ref-name }}
