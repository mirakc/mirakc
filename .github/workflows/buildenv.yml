name: buildenv

on:
  schedule:
    - cron: '12 12 * * *' # UTC
  workflow_dispatch:

env:
  DEBIAN_CODENAME: trixie

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: none
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Check if update available
        id: check
        uses: lucacome/docker-image-update-checker@a233de0585661c019fb71f9601328db37051cc66 # v2.0.0
        with:
          base-image: rust:slim-${{ env.DEBIAN_CODENAME }}
          image: mirakc/buildenv:debian-${{ env.DEBIAN_CODENAME }}-linux-amd64
  docker:
    needs: check
    if: needs.check.outputs.needs-updating == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          if [ -e ./scripts/update-buildenv-images.sh ]
          then
            sh ./scripts/update-buildenv-images.sh --no-cache --push ${{ env.DEBIAN_CODENAME }}
          else
            ./scripts/update-buildenv-images --no-cache --push ${{ env.DEBIAN_CODENAME }}
          fi
